<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marketplace - VinisTech</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="assets/logo.png">
</head>
<body>

  <header class="glass-header">
    <img src="assets/logo.png" alt="VinisTech Logo" class="logo">
    <button class="hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="services.html">Services</a></li>
      <li><a href="marketplace.html">Marketplace</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="demo.html">Demos</a></li>
      <li><button class="theme-toggle"></button></li>
    </ul>
  </header>

  <main>
    <div class="bento-grid">
      <div class="bento-card large scroll-animate">
        <img src="assets/marketplace-1.png" alt="Smartwatch" style="width:100%; border-radius: 20px;">
        <h3>NeoWatch X1</h3>
        <p>$299 – Futuristic wearable</p>
        <button class="btn-neumo ripple-btn">Buy Now</button>
      </div>
      <div class="bento-card scroll-animate">
        <img src="assets/marketplace-2.png" alt="Cloud Server" style="width:100%; border-radius: 20px;">
        <h3>CloudMesh Pro</h3>
        <p>$49/mo – Scalable hosting</p>
        <button class="btn-neumo ripple-btn">Learn More</button>
      </div>
      <div class="bento-card tall scroll-animate">
        <img src="assets/marketplace-3.png" alt="AI Chip" style="width:100%; border-radius: 20px;">
        <h3>AI Accelerator</h3>
        <p>$899 – Edge computing device</p>
        <button class="btn-neumo ripple-btn">Pre‑order</button>
      </div>
    </div>
  </main>

  <footer class="glass-footer">
    <p>© 2026 VinisTech.in. All rights reserved.</p>
  </footer>

  <script src="js/main.js"></script>
